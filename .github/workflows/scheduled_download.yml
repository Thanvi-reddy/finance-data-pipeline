name: Scheduled Stock Download

on:
  workflow_dispatch:
  repository_dispatch:
    types: [supabase-trigger]

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Market-hours guard
        id: guard
        continue-on-error: true
        run: python scripts/market_guard.py

      - name: Download CSVs from Supabase
        if: steps.guard.outcome == 'success'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import os, csv
          from scripts.supabase_storage import download_all
          with open('tickers.csv') as f:
              tickers = [row['ticker'].strip() for row in csv.DictReader(f)]
          download_all(tickers)
          "

      - name: Run download (only if market open)
        if: steps.guard.outcome == 'success'
        run: |
          mkdir -p logs
          echo "RUN $(date -u) - market open, downloading" | tee -a logs/run.log
          python finance_pipeline.py 2>&1 | tail -20 | tee -a logs/pipeline_detail.log
          echo "RUN $(date -u) - download complete" | tee -a logs/run.log

      - name: Upload updated CSVs to Supabase
        if: steps.guard.outcome == 'success'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
          import os, csv
          from scripts.supabase_storage import upload_all
          with open('tickers.csv') as f:
              tickers = [row['ticker'].strip() for row in csv.DictReader(f)]
          upload_all(tickers)
          "

      - name: Log skip (market closed)
        if: steps.guard.outcome == 'failure'
        run: |
          mkdir -p logs
          echo "SKIP $(date -u) - market closed" | tee -a logs/run.log

      - name: Commit logs and data
        run: |
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'
          git add logs/ data/earliest_dates_summary.csv || true
          git commit -m "scheduled run $(date -u)" || echo 'nothing to commit'
          git push || echo 'nothing to push'